<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>💌 KHAS UNTUKMU ZULAIKHA</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial;
        }

        body {
            height: 100vh;
            background: linear-gradient(135deg, #ffe6f0, #fff);

            background-image: url("https://www.transparenttextures.com/patterns/flowers.png");
            background-repeat: repeat;
            background-size: 200px;

            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* flowers */
        body::before {
            content: "🌹 🌸 🌼 🌹 🌸 🌼 🌹 🌸 🌼";
            position: absolute;
            font-size: 45px;
            opacity: 0.12;
            white-space: pre;
            animation: float 25s linear infinite;
        }

        @keyframes float {
            0% {
                transform: translateY(0);
            }

            100% {
                transform: translateY(-200px);
            }
        }

        /* card */
        .card {
            background: rgba(255, 255, 255, 0.88);
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            max-width: 380px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            z-index: 2;
        }

        h1 {
            color: #ff4d88;
            margin-bottom: 10px;
        }

        p {
            color: #444;
            margin: 10px 0;
        }

        img {
            width: 140px;
            margin: 10px 0;
        }

        /* button */
        button {
            margin-top: 15px;
            padding: 12px 25px;
            border: none;
            border-radius: 20px;
            background: #ff4d88;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }

        button:hover {
            transform: scale(1.1);
        }
    </style>

</head>

<body>

    <div class="card">

        <h1>💖 A Special Message </h1>

        <p>HIIII IKAAAA MEKK DA BENDA NAK PDHHHH!!!!!</p>

        <img src="pls.gif" alt="gif">

        <p>tekan dibah tok untuk teruskan 💌</p>

        <button onclick="location.href='message.html'">
            Start 💌
        </button>

    </div>

</body>

</html>
