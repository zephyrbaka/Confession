<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💖</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: Arial;
}

body {
  height: 100vh;
  background: linear-gradient(135deg, #ffe6f0, #fff);
  display: flex;
  justify-content: center;
  align-items: center;
  overflow: hidden;
  position: relative;
}

/* 🌸 background bunga */
body::before {
  content: "🌹 🌸 🌼 🌹 🌸 🌼 🌹 🌸 🌼 🌹 🌸 🌼";
  position: absolute;
  font-size: 50px;
  opacity: 0.12;
  white-space: pre;
  animation: float 25s linear infinite;
}

@keyframes float {
  0% { transform: translateY(0); }
  100% { transform: translateY(-250px); }
}

/* card utama */
.card {
  background: rgba(255,255,255,0.85);
  padding: 30px;
  border-radius: 20px;
  text-align: center;
  box-shadow: 0 10px 30px rgba(0,0,0,0.1);
  z-index: 2;
  max-width: 300px;
}

/* text */
h1 {
  color: #ff4d88;
  margin-bottom: 10px;
}

p {
  color: #444;
  margin-bottom: 10px;
  line-height: 1.4;
}

/* heart animation */
.heart {
  font-size: 50px;
  animation: beat 1s infinite;
}

@keyframes beat {
  0% { transform: scale(1); }
  50% { transform: scale(1.3); }
  100% { transform: scale(1); }
}

/* button balik (optional) */
button {
  margin-top: 15px;
  padding: 10px 20px;
  border: none;
  border-radius: 20px;
  background: #ff4d88;
  color: white;
  cursor: pointer;
}

button:hover {
  transform: scale(1.1);
}
</style>

</head>

<body>

<div class="card">

  <div class="heart">💖</div>

  <h1>YEEEAAAAY🥰</h1>

  <p>
    THANKYOUUUU DH TERIMAA 💌<br>
    Ktk dhh polahh mekk happyyy 🌸
  </p>

  <p>
    In Sha Allah till jannah 💖
  </p>

  <button onclick="location.href='index.html'">
    Replay 💌
  </button>

</div>

</body>
</html>
